<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Trekoon board — local-first workspace for browsing epics, tasks, and flow states."
    />
    <title>Trekoon Board</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div class="board-shell">
      <div class="board-noise"></div>
      <main id="app" class="board-app" aria-live="polite">
        <section class="board-loading" aria-label="Loading board">
          <div class="board-loading__badge">Trekoon board</div>
          <h1>Preparing your local workspace…</h1>
          <p>
            Loading epics, tasks, and saved board context from your repo-shared
            storage.
          </p>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
